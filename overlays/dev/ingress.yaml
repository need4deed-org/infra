apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: be
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: aits.need4deed.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: be
                port:
                  number: 8000
  tls:
    - hosts:
        - aits.need4deed.org
